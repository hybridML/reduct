# Healthcare / HIPAA Industry Template
#
# Reduct uses these patterns to automatically detect and redact
# PHI/PII before it reaches any LLM.

domain: healthcare
description: "Clinical decision support with zero PHI exposure to LLMs"

# Common drug names to auto-register
entities:
  - metformin
  - lisinopril
  - atorvastatin
  - aspirin
  - omeprazole
  - losartan
  - amlodipine
  - metoprolol
  - warfarin
  - insulin
  - prednisone
  - amoxicillin
  - ciprofloxacin
  - azithromycin
  - hydrochlorothiazide
  - sertraline
  - fluoxetine
  - levothyroxine
  - albuterol
  - ibuprofen

# Common conditions
  - diabetes
  - hypertension
  - hyperlipidemia
  - asthma
  - COPD
  - depression
  - anxiety
  - hypothyroidism
  - kidney disease
  - heart failure
  - atrial fibrillation
  - arthritis

# Patterns to detect in user messages
patterns:
  - "\\b\\d{3}-\\d{2}-\\d{4}\\b"  # SSN
  - "\\bMRN[-:]?\\s*\\d+\\b"      # Medical record number
  - "\\b\\d{1,2}[/-]\\d{1,2}[/-]\\d{2,4}\\b"  # Dates
  - "\\b[A-Z][a-z]+\\s+[A-Z][a-z]+\\b"  # Names (First Last)

# Context entities typically provided per conversation
context_template:
  patient_id: "string"          # Maps to ENT_N
  patient_age: "number"         # Obfuscated to age_range
  medications: "list[string]"   # Each maps to ENT_N
  conditions: "list[string]"   # Each maps to ENT_N
  allergies: "list[string]"    # Each maps to ENT_N

# Example prompts this domain handles
example_prompts:
  - "Can this patient take {medication} with their current medications?"
  - "Are there any contraindications for {medication} given {condition}?"
  - "What screening should {patient} receive given their risk factors?"
  - "Does {medication} interact with any of {patient}'s current prescriptions?"
  - "What is the standard of care for {condition} in a patient with {comorbidity}?"